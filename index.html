<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  :root{
    --accent:#22d37a;
    --accent-soft: color-mix(in srgb, var(--accent) 18%, transparent);
    --bg:#0c1118;
    --panel:#141b25;
    --panel-2:#1b2430;
    --line:#27313f;
    --ink:#eef3f8;
    --ink-dim:#9aa8b8;
    --ink-faint:#5d6b7c;
    --gold:#f5c451;
    --bad:#ff6b6b;
    --radius:14px;
    --shadow:0 18px 40px -22px rgba(0,0,0,.8);
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:
      radial-gradient(1100px 500px at 80% -10%, color-mix(in srgb,var(--accent) 10%, transparent), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(80,120,255,.07), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Sora',system-ui,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:1040px;margin:0 auto;padding:22px 18px 80px}
  a{color:var(--accent)}
  button{font-family:inherit}
  /* visible keyboard focus everywhere (WCAG 2.4.7) */
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
  .skip{position:absolute;left:-9999px;top:0;background:var(--accent);color:#06140c;
    padding:9px 14px;border-radius:0 0 8px 0;font-weight:700;z-index:120}
  .skip:focus{left:0}

  header.app{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:18px 0 20px;border-bottom:1px solid var(--line);margin-bottom:22px;
  }
  .crest{
    width:50px;height:50px;border-radius:13px;flex:none;
    background:linear-gradient(140deg,var(--accent),color-mix(in srgb,var(--accent) 40%,#000));
    display:grid;place-items:center;font-size:26px;box-shadow:var(--shadow);
  }
  .titles h1{
    font-family:'Anton',sans-serif;font-weight:400;letter-spacing:.5px;
    font-size:clamp(26px,4.6vw,40px);margin:0;line-height:.95;text-transform:uppercase;
  }
  .titles .sub{color:var(--ink-dim);font-size:13px;letter-spacing:.4px;margin-top:3px}
  .spacer{flex:1}
  .pill{
    font-size:11.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-dim);
    border:1px solid var(--line);padding:6px 11px;border-radius:999px;white-space:nowrap;
  }
  .pill.live{color:var(--accent);border-color:var(--accent-soft);background:var(--accent-soft)}
  @media(max-width:560px){
    header.app{padding:12px 0 12px;margin-bottom:14px;gap:9px}
    .crest{width:40px;height:40px;font-size:21px;border-radius:11px}
    .titles h1{font-size:22px}
    .titles .sub{font-size:11.5px;margin-top:2px}
    .user-chip{padding:3px 5px;font-size:12px}
    .user-chip .avatar{width:24px;height:24px}
  }

  #authArea{display:flex;align-items:center;gap:9px}
  .user-chip{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:4px 6px 4px 4px;font-size:12.5px;color:var(--ink-dim)}
  .avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;background:var(--panel-2);flex:none}
  .gbtn{display:inline-flex;align-items:center;gap:8px}
  .gbtn svg{width:16px;height:16px}

  nav.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px}
  nav.tabs button{
    background:var(--panel);color:var(--ink-dim);border:1px solid var(--line);
    padding:9px 15px;border-radius:999px;cursor:pointer;font-size:13.5px;font-weight:600;
    transition:.15s;
  }
  nav.tabs button:hover{color:var(--ink);border-color:var(--ink-faint)}
  nav.tabs button.on{background:var(--accent);color:#06140c;border-color:var(--accent)}

  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px;box-shadow:var(--shadow);margin-bottom:16px;
  }
  .card h2{font-family:'Anton',sans-serif;font-weight:400;letter-spacing:.4px;text-transform:uppercase;
    font-size:19px;margin:0 0 4px}
  .card .lead{color:var(--ink-dim);font-size:14px;margin:0 0 16px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:680px){.grid2{grid-template-columns:1fr}}

  label.fld{display:block;margin-bottom:13px}
  label.fld span.lbl{display:block;font-size:12px;color:var(--ink-dim);margin-bottom:5px;letter-spacing:.3px}
  input,select,textarea{
    width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    padding:11px 13px;border-radius:10px;font-family:inherit;font-size:14.5px;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  input[type=color]{padding:4px;height:44px;cursor:pointer}

  .btn{
    background:var(--accent);color:#06140c;border:none;padding:11px 18px;border-radius:10px;
    font-weight:700;cursor:pointer;font-size:14px;transition:.15s;
  }
  .btn:hover{filter:brightness(1.07)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--ink-faint)}
  .btn.danger{background:transparent;color:var(--bad);border:1px solid color-mix(in srgb,var(--bad) 40%,transparent)}
  .btn.sm{padding:7px 12px;font-size:12.5px;border-radius:8px}
  .btn.white{background:#fff;color:#1a1a1a}
  .row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}

  .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:11px 10px;border-bottom:1px solid var(--line)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-faint);font-weight:600}
  tr:last-child td{border-bottom:none}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  @media(max-width:680px){ th,td{padding:9px 7px;font-size:13px} }

  .rank{font-family:'Anton',sans-serif;font-size:20px;width:34px;color:var(--ink-faint)}
  .rank.top{color:var(--gold)}
  .pts{font-family:'Anton',sans-serif;font-size:20px;color:var(--accent)}
  .me-row{background:var(--accent-soft)}
  .spoon td{color:var(--bad)}
  tr.unpaid td{background:color-mix(in srgb,var(--bad) 9%,transparent)}
  .lbcard{padding:12px 4px;border-bottom:1px solid var(--line)}
  .lbcard:last-child{border-bottom:none}
  .lbcard.me{background:var(--accent-soft);border-radius:10px}
  .lbtop{display:flex;align-items:center;gap:10px}
  .lbname{flex:1;min-width:0;font-weight:600;overflow-wrap:anywhere}
  .lbname .note{font-weight:400}
  .lbalive{font-size:12px;color:var(--ink-dim);font-variant-numeric:tabular-nums;white-space:nowrap}
  .lbcard.spoon .lbname{color:var(--bad)}
  .lbteams{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
  .lbteam{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--ink-dim);
    background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:3px 7px;white-space:nowrap}
  .lbteam .flag{width:15px}
  .lbteam.out{opacity:.42;text-decoration:line-through}
  @media(max-width:560px){
    .lbteam{border:none;background:transparent;padding:0;font-size:12px}
    .lbteams{gap:3px 11px;margin-top:7px}
  }
  .pip{display:inline-block;width:10px;height:10px;border-radius:2px;margin:0 1px;vertical-align:middle;background:var(--ink-faint)}
  .pip.W{background:#22c55e} .pip.D{background:var(--ink-faint)} .pip.L{background:var(--bad)}
  .rec{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:.5px;white-space:nowrap}
  .rec .w{color:#22c55e} .rec .d{color:var(--ink-dim)} .rec .l{color:var(--bad)}
  .toggle{display:flex;align-items:flex-start;gap:9px;cursor:pointer;font-size:13px;color:var(--ink-dim)}
  .toggle input{width:auto;margin-top:3px;accent-color:var(--accent)}
  .tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:1px 6px;border-radius:5px;vertical-align:middle;margin-left:4px}
  .tag.safe{color:#22c55e;background:color-mix(in srgb,#22c55e 16%,transparent);border:1px solid color-mix(in srgb,#22c55e 40%,transparent)}
  .tag.risk{color:var(--bad);background:color-mix(in srgb,var(--bad) 14%,transparent);border:1px solid color-mix(in srgb,var(--bad) 40%,transparent)}
  .pinwrap .lbcard{outline:2px solid var(--accent);outline-offset:-2px;border-radius:10px}

  .flag{width:22px;height:auto;border-radius:2px;vertical-align:middle;
    box-shadow:0 0 0 1px rgba(0,0,0,.35);background:var(--panel-2)}
  .noflag{display:inline-block;width:22px;text-align:center}
  .team .flag{width:19px}
  .team{display:inline-flex;align-items:center;gap:7px;background:var(--panel-2);
    border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:13px;margin:3px 4px 3px 0}
  .team.out{opacity:.45;text-decoration:line-through}
  .team .grp{color:var(--ink-faint);font-size:11px}

  .stat{display:flex;gap:18px;flex-wrap:wrap;margin-top:6px}
  .stat .b{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:12px 16px;flex:1;min-width:130px}
  .stat .b .n{font-family:'Anton',sans-serif;font-size:26px;line-height:1}
  .stat .b .l{font-size:11.5px;color:var(--ink-dim);letter-spacing:.3px;margin-top:4px;text-transform:uppercase}

  .note{font-size:12.5px;color:var(--ink-faint);margin-top:10px}
  .warn{background:color-mix(in srgb,var(--gold) 12%,transparent);border:1px solid color-mix(in srgb,var(--gold) 35%,transparent);
    color:var(--gold);padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:14px}
  .good{background:var(--accent-soft);border:1px solid var(--accent-soft);color:var(--ink);
    padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:14px}
  .empty{color:var(--ink-faint);font-size:14px;padding:24px 6px;text-align:center}

  fieldset.grp-set{border:1px solid var(--line);border-radius:11px;margin:0 0 10px;padding:10px 12px 12px}
  fieldset.grp-set legend{font-weight:700;font-size:13px;padding:0 6px;color:var(--accent)}

  .grouprow{display:grid;grid-template-columns:1fr 130px 50px 50px;gap:8px;align-items:center;margin-bottom:7px}
  @media(max-width:560px){.grouprow{grid-template-columns:1fr 60px 50px 50px}.grouprow .gd{display:none}}
  .grouprow .vs{font-size:13px}
  .grouprow input{padding:7px 8px;text-align:center;font-size:14px}
  .pendtag{font-size:11px;color:var(--gold);margin-left:6px;white-space:nowrap}
  .ko-team{display:flex;align-items:center;gap:8px;padding:8px 9px;border:1px solid var(--line);
    border-radius:9px;margin:0 0 6px;cursor:pointer;background:var(--panel-2);font-size:13.5px}
  .ko-team.sel{border-color:var(--accent);background:var(--accent-soft)}
  .ko-team input{width:18px;height:18px;flex:none;accent-color:var(--accent)}
  .kogrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  @media(max-width:680px){.kogrid{grid-template-columns:1fr}}

  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--panel-2);
    border:1px solid var(--accent);color:var(--ink);padding:11px 18px;border-radius:10px;font-size:14px;
    box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none;z-index:50;max-width:90vw}
  .toast.show{opacity:1;bottom:30px}
  .scrim{position:fixed;inset:0;background:rgba(5,8,12,.7);display:none;place-items:center;z-index:40;padding:18px}
  .scrim.show{display:grid}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px;max-width:400px;width:100%;box-shadow:var(--shadow)}
  .demobar{background:color-mix(in srgb,var(--gold) 16%,var(--panel));border-bottom:1px solid color-mix(in srgb,var(--gold) 40%,transparent);
    color:var(--gold);font-size:12.5px;text-align:center;padding:7px 14px}
  a.btn{display:inline-block;text-decoration:none}
  .sitefoot{margin-top:30px;padding-top:18px;border-top:1px solid var(--line);text-align:center}
  .sitefoot a{font-size:12.5px;color:var(--ink-dim);text-decoration:none}
  .sitefoot a:hover{color:var(--accent)}
</style>
</head>

/* ============ Scoring engine ============ */
function stageReached(t){for(let i=STAGES.length-1;i>=0;i--){if((S.results.advanced[STAGES[i].key]||[]).includes(t))return i+1;}return 0;}
function currentStageIndex(){for(let i=STAGES.length-1;i>=0;i--){if((S.results.advanced[STAGES[i].key]||[]).length)return i+1;}return 0;}
function isOut(t){const cs=currentStageIndex();if(cs>=1)return stageReached(t)<cs;return groupEliminated(t);}
function groupPoints(t){
  let p=0;const g=groupOf(t);const arr=S.results.group[g];if(!arr)return 0;const teams=GROUPS[g];
  arr.forEach((m,i)=>{
    if(!m||m.sa===""||m.sb===""||m.sa==null||m.sb==null)return;
    const a=teams[GROUP_COMBOS[i][0]],b=teams[GROUP_COMBOS[i][1]];const sa=+m.sa,sb=+m.sb;
    if(t!==a&&t!==b)return;const mine=(t===a)?sa:sb,theirs=(t===a)?sb:sa;
    if(mine>theirs)p+=S.config.scoring.win; else if(mine===theirs)p+=S.config.scoring.draw;
  });
  return p;
}
function progressionPoints(t){const st=stageReached(t);let p=0;for(let i=0;i<st;i++)p+=STAGES[i].pts;return p;}
function teamPoints(t){return groupPoints(t)+progressionPoints(t);}

}

/* ============ Group tables + automated R32 qualification ============ */
function groupTable(g){
  const teams=GROUPS[g];const st={};teams.forEach(t=>st[t]={t,pld:0,gf:0,ga:0,pts:0});
  (S.results.group[g]||[]).forEach((m,i)=>{
    if(!m||m.sa===""||m.sb===""||m.sa==null||m.sb==null)return;
    const a=teams[GROUP_COMBOS[i][0]],b=teams[GROUP_COMBOS[i][1]];const sa=+m.sa,sb=+m.sb;
    const A=st[a],B=st[b];A.pld++;B.pld++;A.gf+=sa;A.ga+=sb;B.gf+=sb;B.ga+=sa;
    if(sa>sb)A.pts+=3;else if(sa<sb)B.pts+=3;else{A.pts++;B.pts++;}
  });
  // FIFA-style ranking: points, then goal difference, then goals for.
  return Object.values(st).map(x=>({...x,gd:x.gf-x.ga}))
    .sort((x,y)=>y.pts-x.pts||y.gd-x.gd||y.gf-x.gf||x.t.localeCompare(y.t));
}
function autoQualifyR32(){
  const winners=[],runners=[],thirds=[];
  for(const g of Object.keys(GROUPS)){
    const played=(S.results.group[g]||[]).filter(m=>m&&m.sa!==""&&m.sb!==""&&m.sa!=null&&m.sb!=null).length;
    if(played<6) return {ok:false,msg:`Group ${g} has only ${played}/6 results entered.`};
    const tab=groupTable(g);
    winners.push(tab[0].t);runners.push(tab[1].t);thirds.push({...tab[2],g});
  }
  thirds.sort((x,y)=>y.pts-x.pts||y.gd-x.gd||y.gf-x.gf||x.t.localeCompare(y.t));
  const best8=thirds.slice(0,8).map(x=>x.t);
  return {ok:true, teams:[...winners,...runners,...best8], best8};
}
/* ---- Conservative qualification status (group stage) ---- */
function matchPlayed(m){return !!(m&&m.sa!==""&&m.sb!==""&&m.sa!=null&&m.sb!=null);}
function groupComplete(g){return (S.results.group[g]||[]).filter(matchPlayed).length===6;}
function allGroupsComplete(){return Object.keys(GROUPS).every(groupComplete);}
// Only TRUE when a team is mathematically eliminated (never over-claims).
function groupEliminated(t){
  const g=groupOf(t),tab=groupTable(g),me=tab.find(x=>x.t===t);if(!me)return false;
  const meMax=me.pts+3*(3-me.pld);
  if(tab.filter(x=>x.t!==t&&x.pts>meMax).length>=3)return true;            // locked into 4th — can't even finish 3rd
  if(groupComplete(g)){
    const pos=tab.findIndex(x=>x.t===t);
    if(pos===3)return true;                                                // finished 4th
    if(pos===2&&allGroupsComplete()){const r=autoQualifyR32();return !(r.ok&&r.best8.includes(t));} // 3rd, not a best-8
  }
  return false;
}
// Display tag (group stage only): 'safe' = clinched top 2, 'risk' = currently below the line, 'out', '' = neutral.
function teamStatus(t){
  if(isOut(t))return 'out';
  if(currentStageIndex()>=1)return '';            // knockouts: still in, no tag
  if(allGroupsComplete())return 'safe';            // groups finished & not eliminated => qualified
  const tab=groupTable(groupOf(t)),me=tab.find(x=>x.t===t);if(!me||me.pld===0)return ''; // no tag before a team has played
  if(tab.filter(o=>o.t!==t&&(o.pts+3*(3-o.pld))>=me.pts).length<=1)return 'safe'; // clinched top 2
  if(tab.findIndex(x=>x.t===t)>=2)return 'risk';   // currently below the line
  return '';
}
function statusTag(t){const s=teamStatus(t);return s==='safe'?' <span class="tag safe">Safe</span>':s==='risk'?' <span class="tag risk">At risk</span>':'';}

/* ============ Draw (balanced snake over strength tiers) ============ */
function computeDraw(){
  const order=shuffle(S.participants.map(p=>p.id));
  let pool=[];for(let t=1;t<=4;t++)pool=pool.concat(shuffle(TEAMS.filter(x=>x.tier===t).map(x=>x.id)));
  const n=order.length;
  // Shared-teams (syndicate) draw — only when there are more players than teams.
  // Everyone gets exactly one team; every team gets at least one owner; the
  // overflow (n-48) teams get a second owner, spread at random across strengths.
  if(S.config.sharedTeams && n>pool.length){
    const T=pool.length, q=Math.floor(n/T), r=n%T;
    let slots=[];for(let c=0;c<q;c++)slots=slots.concat(pool);
    if(r>0)slots=slots.concat(shuffle(pool.slice()).slice(0,r));
    slots=shuffle(slots);
    return order.map((id,i)=>({participant_id:id,team:slots[i]}));
  }
  // Default deal — unchanged (all 48 teams snake-dealt across players).
  const out=[];
  pool.forEach((teamId,k)=>{const round=Math.floor(k/n);const pos=(round%2===0)?(k%n):(n-1-(k%n));out.push({participant_id:order[pos],team:teamId});});
  return out;
}

function fxDayLabel(g,i){const inst=fxInstant(g,i);if(inst)return new Date(inst).toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"});return fmtDate(fxDate(g,i));}
function fxTimeLabel(g,i){const inst=fxInstant(g,i);if(inst)return new Date(inst).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});return "";}
function allFixtures(){const out=[];Object.keys(GROUPS).forEach(g=>GROUP_COMBOS.forEach((c,i)=>{out.push({g,i,t0:GROUPS[g][c[0]],t1:GROUPS[g][c[1]],date:fxDate(g,i),score:fxScore(g,i),sort:fxSortKey(g,i),dayKey:fxDayKey(g,i),dayLabel:fxDayLabel(g,i),timeLabel:fxTimeLabel(g,i)});}));return out;}
function teamFixtures(team){return allFixtures().filter(f=>f.t0===team||f.t1===team).sort((a,b)=>a.sort-b.sort);}
function fmtDate(iso){if(!iso)return "Date TBC";const d=new Date(iso+"T12:00:00Z");return d.toLocaleDateString(undefined,{timeZone:"UTC",weekday:"short",day:"numeric",month:"short"});}
function poolLink(){const base=location.href.split('#')[0].split('?')[0];return base+"?pool="+encodeURIComponent(poolId||"");}
function deviceMeKey(){return "wc_me_"+poolId;}
function pinTop(){try{const v=localStorage.getItem("wc_pin_me");return v===null?true:v==="1";}catch(e){return true;}}
function setPinTop(v){try{localStorage.setItem("wc_pin_me",v?"1":"0");}catch(e){}}
function getDeviceMe(){try{return localStorage.getItem(deviceMeKey());}catch(e){return null;}}
function setDeviceMe(id){try{if(id)localStorage.setItem(deviceMeKey(),id);}catch(e){}}
function meLink(){return poolLink()+"&me="+encodeURIComponent(getDeviceMe()||meId||"");}

}

/* ---- Supabase adapter ---- */
const SupaDB = {
  async loadPool(id){
    const {data:pool}=await sb.from('pools').select('*').eq('id',id).maybeSingle();
    if(!pool)return null;
    const [p,a,g,v]=await Promise.all([
      sb.from('participants').select('*').eq('pool_id',id),
      sb.from('assignments').select('*').eq('pool_id',id),
      sb.from('group_results').select('*').eq('pool_id',id),
      sb.from('advanced').select('*').eq('pool_id',id)
    ]);
    return assembleS(pool,p.data,a.data,g.data,v.data);
  },
  async myPools(){
    const u=Auth.user();if(!u)return [];
    const {data}=await sb.from('pools').select('id,name').contains('organiser_emails',[lc(u.email)]);
    return data||[];
  },
  async createPool({id,name,config,email}){
    const {error}=await sb.from('pools').insert({id,name,config,organiser_emails:[lc(email)]});
    if(error)throw error;return id;
  },
  async addOrganiser(email){
    const next=Array.from(new Set([...(S.config.organiserEmails||[]),lc(email)]));
    const {error}=await sb.from('pools').update({organiser_emails:next}).eq('id',poolId);
    if(error)throw error;
  },
  async joinPool(name){
    const u=Auth.user();
    const {data,error}=await sb.from('participants')
      .insert({pool_id:poolId,name,user_id:u?u.id:null,email:u?lc(u.email):null}).select('id').single();
    if(error)throw error;return data.id;
  },
  async addParticipant(name){const {error}=await sb.from('participants').insert({pool_id:poolId,name});if(error)throw error;},
  async removeParticipant(id){const {error}=await sb.from('participants').delete().eq('id',id);if(error)throw error;},
  async runDraw(arr){const {error}=await sb.rpc('run_draw',{p:poolId,a:arr});if(error)throw error;},
  async setConfig(patch){const {error}=await sb.rpc('set_config',{p:poolId,patch});if(error)throw error;},
  async upsertGroup(g,i,patch){const {error}=await sb.rpc('upsert_group',{p:poolId,g,i,patch});if(error)throw error;},
  async setStage(stage,teams){
    await sb.from('advanced').delete().eq('pool_id',poolId).eq('stage',stage);
    if(teams.length)await sb.from('advanced').insert(teams.map(t=>({pool_id:poolId,stage,team:t})));
  },
  async setAdvanced(team,add,remove){
    if(add&&add.length)await sb.from('advanced').upsert(add.map(s=>({pool_id:poolId,stage:s,team})),{onConflict:'pool_id,stage,team',ignoreDuplicates:true});
    if(remove&&remove.length)await sb.from('advanced').delete().eq('pool_id',poolId).eq('team',team).in('stage',remove);
  },
  async reset(){const {error}=await sb.rpc('reset_pool',{p:poolId});if(error)throw error;},
  async importPool(snap){
    await this.reset();
    const c=snap.config||{};
    await sb.rpc('set_config',{p:poolId,patch:{header:c.header,accentColor:c.accentColor,pot:c.pot,prizes:c.prizes,scoring:c.scoring,drawDone:!!c.drawDone,signupsOpen:c.signupsOpen!==false}});
    const idMap={};
    const partRows=(snap.participants||[]).map(p=>{const id=crypto.randomUUID();idMap[p.id]=id;return {id,pool_id:poolId,name:p.name,user_id:p.user_id||null,email:p.email||null};});
    if(partRows.length){const {error}=await sb.from('participants').insert(partRows);if(error)throw error;}
    const asg=[];Object.entries(snap.assignments||{}).forEach(([pid,teams])=>{const np=idMap[pid];if(np)(teams||[]).forEach(t=>asg.push({pool_id:poolId,participant_id:np,team:t}));});
    if(asg.length){const {error}=await sb.from('assignments').insert(asg);if(error)throw error;}
    const gr=[];Object.entries((snap.results||{}).group||{}).forEach(([g,arr])=>(arr||[]).forEach((m,i)=>{if(m&&(m.sa!==""||m.sb!==""||m.date))gr.push({pool_id:poolId,grp:g,idx:i,score_a:m.sa===""?null:Number(m.sa),score_b:m.sb===""?null:Number(m.sb),match_date:m.date||null,source:m.source||'manual'});}));
    if(gr.length){const {error}=await sb.from('group_results').upsert(gr,{onConflict:'pool_id,grp,idx'});if(error)throw error;}
    const adv=[];Object.entries((snap.results||{}).advanced||{}).forEach(([st,teams])=>(teams||[]).forEach(t=>adv.push({pool_id:poolId,stage:st,team:t})));
    if(adv.length){const {error}=await sb.from('advanced').insert(adv);if(error)throw error;}
  },
  async loadPayments(){const {data,error}=await sb.from('payments').select('*').eq('pool_id',poolId);if(error)throw error;return data||[];},
  async setPayment(participant_id,patch){const {error}=await sb.from('payments').upsert(Object.assign({pool_id:poolId,participant_id,updated_at:new Date().toISOString()},patch),{onConflict:'pool_id,participant_id'});if(error)throw error;},
  subscribe(id,cb){
    const ch=sb.channel('pool-'+id);
    ch.on('postgres_changes',{event:'*',schema:'public',table:'pools',filter:'id=eq.'+id},cb);
    ['participants','assignments','group_results','advanced'].forEach(tbl=>
      ch.on('postgres_changes',{event:'*',schema:'public',table:tbl,filter:'pool_id=eq.'+id},cb));
    ch.subscribe();
    return ()=>{sb.removeChannel(ch);};
  }
};

/* ---- Demo adapter (localStorage; rows shaped like Supabase) ---- */
const DKEY="wc_demo_db_v1";
function demoAll(){try{return JSON.parse(localStorage.getItem(DKEY)||"{}");}catch(e){return {};}}
function demoWrite(o){localStorage.setItem(DKEY,JSON.stringify(o));window.dispatchEvent(new Event("wc-demo-change"));}
function demoPool(o,id){return o[id]||(o[id]={pool:{id,name:"",config:{},organiser_emails:[]},participants:[],assignments:[],group:[],advanced:[],payments:[]});}
const DemoDB={
  async loadPool(id){const o=demoAll();const p=o[id];if(!p)return null;return assembleS(p.pool,p.participants,p.assignments,p.group,p.advanced);},
  async myPools(){const u=Auth.user();if(!u)return [];const o=demoAll();
    return Object.values(o).filter(p=>(p.pool.organiser_emails||[]).map(lc).includes(lc(u.email))).map(p=>({id:p.pool.id,name:p.pool.name}));},
  async createPool({id,name,config,email}){const o=demoAll();const p=demoPool(o,id);p.pool={id,name,config,organiser_emails:[lc(email)]};demoWrite(o);return id;},
  async addOrganiser(email){const o=demoAll();const p=demoPool(o,poolId);p.pool.organiser_emails=Array.from(new Set([...(p.pool.organiser_emails||[]),lc(email)]));demoWrite(o);},
  async joinPool(name){const u=Auth.user();const o=demoAll();const p=demoPool(o,poolId);const id=uid();
    p.participants.push({id,name,user_id:u?u.id:null,email:u?lc(u.email):null});demoWrite(o);return id;},
  async addParticipant(name){const o=demoAll();const p=demoPool(o,poolId);p.participants.push({id:uid(),name,user_id:null,email:null});demoWrite(o);},
  async removeParticipant(id){const o=demoAll();const p=demoPool(o,poolId);p.participants=p.participants.filter(x=>x.id!==id);p.assignments=p.assignments.filter(a=>a.participant_id!==id);demoWrite(o);},
  async runDraw(arr){const o=demoAll();const p=demoPool(o,poolId);p.assignments=arr.map(x=>({participant_id:x.participant_id,team:x.team}));
    p.pool.config={...p.pool.config,drawDone:true,signupsOpen:false};demoWrite(o);},
  async setConfig(patch){const o=demoAll();const p=demoPool(o,poolId);p.pool.config={...p.pool.config,...patch};demoWrite(o);},
  async upsertGroup(g,i,patch){const o=demoAll();const p=demoPool(o,poolId);let row=p.group.find(r=>r.grp===g&&r.idx===i);
    if(!row){row={grp:g,idx:i,score_a:null,score_b:null,match_date:null,pending_a:null,pending_b:null,source:"manual"};p.group.push(row);}
    Object.keys(patch).forEach(k=>{row[k]=patch[k];});demoWrite(o);},
  async setStage(stage,teams){const o=demoAll();const p=demoPool(o,poolId);p.advanced=p.advanced.filter(r=>r.stage!==stage).concat(teams.map(t=>({stage,team:t})));demoWrite(o);},
  async setAdvanced(team,add,remove){const o=demoAll();const p=demoPool(o,poolId);
    (add||[]).forEach(s=>{if(!p.advanced.some(r=>r.stage===s&&r.team===team))p.advanced.push({stage:s,team});});
    if(remove&&remove.length)p.advanced=p.advanced.filter(r=>!(r.team===team&&remove.includes(r.stage)));demoWrite(o);},
  async reset(){const o=demoAll();const p=demoPool(o,poolId);p.participants=[];p.assignments=[];p.group=[];p.advanced=[];p.payments=[];
    p.pool.config={...p.pool.config,drawDone:false,signupsOpen:true};demoWrite(o);},
  async importPool(snap){const o=demoAll();const p=demoPool(o,poolId);const c=snap.config||{};
    p.pool.config={...p.pool.config,header:c.header,accentColor:c.accentColor,pot:c.pot,prizes:c.prizes,scoring:c.scoring,drawDone:!!c.drawDone,signupsOpen:c.signupsOpen!==false};
    const idMap={};p.participants=(snap.participants||[]).map(pp=>{const id=uid();idMap[pp.id]=id;return {id,name:pp.name,user_id:pp.user_id||null,email:pp.email||null};});
    p.assignments=[];Object.entries(snap.assignments||{}).forEach(([pid,teams])=>{const np=idMap[pid];if(np)(teams||[]).forEach(t=>p.assignments.push({participant_id:np,team:t}));});
    p.group=[];Object.entries((snap.results||{}).group||{}).forEach(([g,arr])=>(arr||[]).forEach((m,i)=>{if(m&&(m.sa!==""||m.sb!==""||m.date))p.group.push({grp:g,idx:i,score_a:m.sa===""?null:Number(m.sa),score_b:m.sb===""?null:Number(m.sb),match_date:m.date||null,pending_a:null,pending_b:null,source:m.source||'manual'});}));
    p.advanced=[];Object.entries((snap.results||{}).advanced||{}).forEach(([st,teams])=>(teams||[]).forEach(t=>p.advanced.push({stage:st,team:t})));
    demoWrite(o);},
  async loadPayments(){const o=demoAll();const p=demoPool(o,poolId);return (p.payments||[]).slice();},
  async setPayment(participant_id,patch){const o=demoAll();const p=demoPool(o,poolId);p.payments=p.payments||[];let row=p.payments.find(r=>r.participant_id===participant_id);if(!row){row={pool_id:poolId,participant_id,amount:null,paid:false,paid_at:null};p.payments.push(row);}Object.assign(row,patch);demoWrite(o);},
  subscribe(id,cb){const h=()=>cb();window.addEventListener("wc-demo-change",h);window.addEventListener("storage",h);
    return ()=>{window.removeEventListener("wc-demo-change",h);window.removeEventListener("storage",h);};}
};
const DB = CONFIGURED ? SupaDB : DemoDB;

function isOrganiser(){const u=Auth.user();return !!(u&&S&&(S.config.organiserEmails||[]).includes(lc(u.email)));}
function myParticipant(){const u=Auth.user();if(!u||!S)return null;
  return S.participants.find(p=>(p.user_id&&p.user_id===u.id)||(p.email&&lc(p.email)===lc(u.email)))||null;}
function computeMe(){
  const mp=myParticipant();
  if(mp){meId=mp.id;setDeviceMe(mp.id);return;}
  let q=null;try{q=new URLSearchParams(location.search).get("me");}catch(e){}
  if(q&&S.participants.some(p=>p.id===q)){meId=q;setDeviceMe(q);return;}
  const dm=getDeviceMe();
  meId=(dm&&S.participants.some(p=>p.id===dm))?dm:null;
}
function joinedAlready(){return !!myParticipant()||!!(getDeviceMe()&&S.participants.some(p=>p.id===getDeviceMe()));}

    <label class="toggle" style="margin:2px 0 14px"><input type="checkbox" id="c_simple" ${S.config.simpleMode?"checked":""}> <span>Simple mode — winner is whoever owns the champion. Hides the points system and shows wins/losses (<span class="pip W"></span> win <span class="pip D"></span> draw <span class="pip L"></span> loss) instead.</span></label>
    <label class="toggle" style="margin:2px 0 14px"><input type="checkbox" id="c_shared" ${S.config.sharedTeams?"checked":""}> <span>Shared teams (syndicates) — only matters if more than 48 people join. Each player gets one team; the extra players share a team with someone (and split any prize), so nobody is left out.</span></label>
    <label class="toggle" style="margin:2px 0 10px"><input type="checkbox" id="c_paid" ${S.config.paidMode?"checked":""}> <span>Paid sweepstake — adds a private <b>💷 Payments</b> tab (only you, the organiser, can see it) to track who's paid.</span></label>
    <label class="fld" style="max-width:220px"><span class="lbl">Entry fee per player ($)</span><input id="c_fee" type="number" min="0" step="0.01" inputmode="decimal" value="${S.config.entryFee!=null?esc(String(S.config.entryFee)):''}" placeholder="e.g. 5"></label>
    <button class="btn" id="c_save">Save event details</button></div>`;

  html+=`<div class="card"><h2>Organisers</h2>
    <p class="lead">People who can manage this sweepstake (by email). ${esc((S.config.organiserEmails||[]).join(", "))}</p>
    <div class="row"><input id="org_email" aria-label="Co-organiser email" placeholder="add co-organiser email" style="max-width:280px"><button class="btn ghost sm" id="org_add">Add organiser</button></div></div>`;

  html+=`<div class="card"><h2>Backup & reset</h2>
    <p class="lead">Export a backup any time. Reset wipes participants, the draw and all results (keeps your settings).</p>
    <div class="row"><button class="btn ghost sm" id="d_exp">Export backup</button>
      <button class="btn ghost sm" id="d_imp">Import backup</button>
      <button class="btn danger sm" id="d_reset">Reset everything</button></div></div>`;
  return html;
}

/* ============ Wiring ============ */
async function refresh(){if(!poolId)return;try{const ns=await DB.loadPool(poolId);if(ns){S=ns;computeMe();render();}}catch(e){console.error(e);}}
async function guard(fn,okMsg){try{await fn();if(okMsg)toast(okMsg);await refresh();}catch(e){console.error(e);toast(e&&e.message?("Error: "+e.message):"Something went wrong");}}
function copyText(t,msg){if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(t).then(()=>toast(msg||"Copied")).catch(()=>showLink(t));else showLink(t);}
function shareLink(){copyText(poolLink(),"Invite link copied");}
function showLink(link){modal(`<h2 style="font-family:Anton;font-weight:400">Invite link</h2><p class="lead">Share this so people can join.</p>
  <label class="fld"><input readonly value="${esc(link)}" onclick="this.select()"></label><div class="row"><button class="btn ghost" onclick="closeModal()">Close</button></div>`);}

function wire(){
  if($("#o_signin"))$("#o_signin").onclick=()=>Auth.signIn();
  if($("#m_signin"))$("#m_signin").onclick=()=>Auth.signIn();
  if($("#j_signin"))$("#j_signin").onclick=()=>Auth.signIn();
  if($("#b_share"))$("#b_share").onclick=shareLink;
  if($("#b_pin"))$("#b_pin").onclick=()=>{setPinTop(!pinTop());render();};
  if($("#m_share"))$("#m_share").onclick=shareLink;
  if($("#m_pers"))$("#m_pers").onclick=()=>copyText(meLink(),"Personal link copied");
  if($("#o_share"))$("#o_share").onclick=shareLink;

  const jgo=$("#j_go");if(jgo)jgo.onclick=async()=>{
    const n=$("#j_name").value.trim();if(!n)return;
    const signed=!!Auth.user();
    try{const id=await DB.joinPool(n);setDeviceMe(id);toast("You're in!");await refresh();}
    catch(e){console.error(e);toast(e&&e.message?("Error: "+e.message):"Could not join");return;}
    const label=signed?"Invite link":"Your personal link";
    const val=signed?poolLink():meLink();
    const blurb=signed?"Signed in, your teams follow you on any device. Share the invite link so others can join."
      :"No account, so bookmark this personal link — it brings you back to your teams on any device. (Or sign in with Google later to sync automatically.)";
    modal(`<h2 style="font-family:Anton;font-weight:400">You're in, ${esc(n)}</h2>
      <p class="lead">${blurb}</p>
      <label class="fld"><span class="lbl">${label}</span><input id="jl" readonly value="${esc(val)}" onclick="this.select()"></label>
      <div class="row"><button class="btn" id="jl_copy">Copy link</button><button class="btn ghost" onclick="closeModal()">Done</button></div>`);
    $("#jl_copy").onclick=()=>copyText(val,signed?"Invite link copied":"Personal link copied");
  };

  if($("#o_toggle"))$("#o_toggle").onclick=()=>guard(async()=>{await DB.setConfig({signupsOpen:!S.config.signupsOpen});});
  if($("#o_add"))$("#o_add").onclick=()=>{
    modal(`<h2 style="font-family:Anton;font-weight:400">Add person</h2>
      <label class="fld"><span class="lbl">Name</span><input id="ap_n" placeholder="Name"></label>
      <div class="row"><button class="btn" id="ap_go">Add</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>`);
    $("#ap_go").onclick=()=>{const n=$("#ap_n").value.trim();if(!n)return;closeModal();guard(async()=>{await DB.addParticipant(n);},"Added");};
  };
  document.querySelectorAll("[data-rm]").forEach(a=>a.onclick=ev=>{ev.preventDefault();guard(async()=>{await DB.removeParticipant(a.dataset.rm);});});
  if($("#o_draw"))$("#o_draw").onclick=()=>{
    if(S.participants.length<1){toast("Need at least one player");return;}
    guard(async()=>{await DB.runDraw(computeDraw());},"Draw complete!").then(()=>{tab="board";render();});
  };

  document.querySelectorAll("input[data-g]").forEach(inp=>inp.onchange=()=>{
    const g=inp.dataset.g,i=+inp.dataset.i,s=inp.dataset.s;const v=inp.value.trim();
    const patch={};patch[s==="a"?"score_a":"score_b"]=v===""?null:Number(v);
    guard(async()=>{await DB.upsertGroup(g,i,patch);},"Saved");
  });
  document.querySelectorAll("input[data-gd]").forEach(inp=>inp.onchange=()=>{
    const g=inp.dataset.gd,i=+inp.dataset.i;
    guard(async()=>{await DB.upsertGroup(g,i,{match_date:inp.value||null});},"Date saved");
  });
  document.querySelectorAll("[data-cfm-g]").forEach(a=>a.onclick=ev=>{ev.preventDefault();
    const g=a.dataset.cfmG,i=+a.dataset.cfmI,pa=Number(a.dataset.pa),pb=Number(a.dataset.pb);
    guard(async()=>{await DB.upsertGroup(g,i,{score_a:pa,score_b:pb,source:"auto-confirmed",pending_a:null,pending_b:null});},"Confirmed");
  });
  if($("#o_cfmall"))$("#o_cfmall").onclick=()=>{
    const pd=pendingMatches();if(!pd.length)return;
    guard(async()=>{for(const m of pd){await DB.upsertGroup(m.g,m.i,{score_a:m.pa,score_b:m.pb,source:"auto-confirmed",pending_a:null,pending_b:null});}},`Confirmed ${pd.length} result${pd.length===1?'':'s'}`);
  };
  document.querySelectorAll("input[data-ko]").forEach(cb=>cb.onchange=()=>{
    const k=cb.dataset.ko,t=cb.value;const ki=STAGES.findIndex(z=>z.key===k);
    if(cb.checked)guard(async()=>{await DB.setAdvanced(t,[k],[]);});
    else{const later=STAGES.slice(ki).map(s=>s.key);guard(async()=>{await DB.setAdvanced(t,[],later);});}
  });
  if($("#o_autoR32"))$("#o_autoR32").onclick=()=>{
    const r=autoQualifyR32();if(!r.ok){toast(r.msg);return;}
    guard(async()=>{await DB.setStage("R32",r.teams);},"Round of 32 set (32 teams)");
  };

  document.querySelectorAll("[data-pay-paid]").forEach(cb=>cb.onchange=async()=>{
    const id=cb.dataset.payPaid;
    try{await DB.setPayment(id,{paid:cb.checked,paid_at:cb.checked?new Date().toISOString():null});PAY=await DB.loadPayments();render();toast(cb.checked?"Marked paid":"Marked unpaid");}
    catch(e){console.error(e);toast("Couldn't save");}
  });
  document.querySelectorAll("[data-pay-amt]").forEach(inp=>inp.onchange=async()=>{
    const id=inp.dataset.payAmt,v=inp.value.trim();
    try{await DB.setPayment(id,{amount:v===""?null:Number(v)});PAY=await DB.loadPayments();render();toast("Saved");}
    catch(e){console.error(e);toast("Couldn't save");}
  });
  if($("#c_save"))$("#c_save").onclick=()=>guard(async()=>{
    await DB.setConfig({header:$("#c_header").value.trim()||S.config.header,accentColor:$("#c_col").value,
      pot:$("#c_pot").value.trim(),prizes:{first:$("#c_p1").value.trim(),second:$("#c_p2").value.trim(),spoon:$("#c_ps").value.trim()},
      simpleMode:$("#c_simple").checked,sharedTeams:$("#c_shared").checked,
      paidMode:$("#c_paid").checked,entryFee:($("#c_fee").value.trim()===""?0:Number($("#c_fee").value))});
  },"Saved");
  if($("#org_add"))$("#org_add").onclick=()=>{const e=lc($("#org_email").value.trim());if(!e){toast("Enter an email");return;}
    guard(async()=>{await DB.addOrganiser(e);},"Organiser added");};

  if($("#d_exp"))$("#d_exp").onclick=()=>{
    const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=(S.config.header||"sweepstake").replace(/\W+/g,"_")+"_backup.json";a.click();
  };
  if($("#d_imp"))$("#d_imp").onclick=()=>{
    const i=document.createElement("input");i.type="file";i.accept=".json";
    i.onchange=()=>{const f=i.files[0];if(!f)return;const r=new FileReader();
      r.onload=()=>{let obj;try{obj=JSON.parse(r.result);}catch(e){toast("Bad file");return;}
        if(!obj||!obj.config||!obj.participants){toast("Not a sweepstake backup");return;}
        modal(`<h2 style="font-family:Anton;font-weight:400">Import backup?</h2>
          <p class="lead">This replaces everyone and all results in <b>this</b> sweepstake with the backup's contents. Export the current state first if unsure.</p>
          <div class="row"><button class="btn danger" id="im_go">Yes, import</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>`);
        $("#im_go").onclick=()=>{closeModal();guard(async()=>{await DB.importPool(obj);},"Imported").then(()=>{tab="board";render();});};
      };r.readAsText(f);};
    i.click();
  };
  if($("#d_reset"))$("#d_reset").onclick=()=>{
    modal(`<h2 style="font-family:Anton;font-weight:400">Reset everything?</h2>
      <p class="lead">This wipes participants, the draw and all results. Export a backup first if unsure.</p>
      <div class="row"><button class="btn danger" id="rs_go">Yes, reset</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>`);
    $("#rs_go").onclick=()=>{closeModal();guard(async()=>{await DB.reset();},"Reset done").then(()=>{tab="org";render();});};
  };
}

/* ============ Boot ============ */
let booting=false;
async function boot(){
  if(booting)return;booting=true;
  try{
    if(unsub){unsub();unsub=null;}
    PAY=null;
    poolId=new URLSearchParams(location.search).get("pool");
    if(!poolId){await renderLanding();return;}
    S=await DB.loadPool(poolId);
    if(!S){renderMissingPool(poolId);return;}
    computeMe();
    if(S.config.drawDone){tab=(meId&&S.assignments[meId])?"mine":"board";}else{tab="join";}
    render();
    let timer=null;
    unsub=DB.subscribe(poolId,()=>{clearTimeout(timer);timer=setTimeout(refresh,250);});
  } finally { booting=false; }
}
(async function(){
  if(!CONFIGURED){const b=$("#demobar");b.hidden=false;
    b.innerHTML='Demo mode — no backend configured, data stays in this browser only. See SETUP.md to go live with Supabase.';}
  await Auth.init();
  Auth.onChange(()=>{boot();});
  await boot();
  // Fallback poll in case realtime is unavailable.
  setInterval(()=>{if(!poolId)return;if($("#scrim").classList.contains("show"))return;if(isOrganiser())return;refresh();},30000);
})();
</script>
</body>
</html>
